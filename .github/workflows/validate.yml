name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile bundled scripts
        run: python -m py_compile skills/progressive-context-router/scripts/*.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
